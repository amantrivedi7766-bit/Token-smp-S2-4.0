name: TokenSMP
version: 1.0.0
main: com.tokensmp.TokenSMPPlugin
api-version: "1.21"
commands:
  tokens:
    description: Show your owned tokens
  tokeninfo:
    description: Show info about all tokens
  spin:
    description: Manually spin the token wheel
  tokensmp:
    description: Admin commands for TokenSMP
permissions:
  tokensmp.admin:
    default: op
  tokensmp.player:
    default: true
